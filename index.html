<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Domestics - Professional Click Edition</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --metallic-silver: #a1a1aa;
            --electric-yellow: #ffeb3b;
            --text-white: #ffffff;
            --error-red: #ff5252;
        }

        body {
            background: var(--bg);
            color: var(--text-white);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #222;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin: 0; font-style: italic; text-transform: uppercase; }
        h1 span { color: var(--electric-yellow); }
        .title-group p { color: #666; font-weight: 700; margin: 5px 0 0; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; }

        .lives-container { font-size: 1.5rem; margin-top: 10px; min-height: 30px; display: flex; gap: 5px; }

        .stats { display: flex; gap: 20px; align-items: center; }

        .score-panel {
            border: 2px solid var(--electric-yellow);
            background: #080808;
            padding: 10px 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 120px;
        }

        .score-panel .label { display: block; font-size: 0.6rem; font-weight: 900; color: #555; letter-spacing: 1px; }
        #score { font-size: 1.5rem; font-weight: 900; color: var(--text-white); }

        #reset-btn {
            background: var(--metallic-silver);
            color: black;
            border: none;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        #reset-btn:hover { background: white; transform: translateY(-2px); }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .room {
            background: var(--card-bg);
            border: 1px solid var(--metallic-silver);
            border-radius: 16px;
            padding: 24px;
            min-height: 220px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .room:hover { border-color: white; transform: translateY(-4px); background: #222; }

        .room h2 { 
            margin-top: 0; 
            font-size: 1.2rem; 
            font-weight: 900; 
            color: white; 
            text-transform: uppercase; 
            border-bottom: 1px solid #333; 
            padding-bottom: 12px;
        }

        .placed-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }

        .placed-word {
            background: white;
            color: black;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .word-bank-section {
            background: #0a0a0a;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #222;
        }

        .bank {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            overflow: visible;
        }

        .word-node {
            background: var(--card-bg);
            border: 1px solid var(--metallic-silver);
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: 0.2s;
            color: white;
            position: relative;
            z-index: 10;
            user-select: none;
        }

        .word-node:hover { border-color: white; color: var(--electric-yellow); }

        .word-node.active {
            border-color: var(--electric-yellow);
            color: var(--electric-yellow);
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 235, 59, 0.2);
        }

        .word-node.error {
            border-color: var(--error-red);
            background: rgba(255, 82, 82, 0.1);
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        .hidden { display: none !important; }

        .modal-content {
            background: #050505; border: 2px solid var(--electric-yellow);
            padding: 60px; border-radius: 24px; text-align: center;
            max-width: 90%;
        }

        .modal-content h2 { font-size: 3rem; font-weight: 900; color: white; margin: 15px 0; }
        .modal-content .icon { font-size: 5rem; margin-bottom: 20px; display: block; }

        .modal-content button {
            background: var(--electric-yellow); border: none; padding: 16px 40px;
            font-size: 1.1rem; font-weight: 900; border-radius: 10px; cursor: pointer; color: black;
            margin-top: 25px; text-transform: uppercase;
        }

        @media (max-width: 600px) {
            header { flex-direction: column; gap: 20px; text-align: center; }
            h1 { font-size: 1.8rem; }
            .rooms-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="title-group">
                <h1>SPANISH <span>DOMESTICS</span></h1>
                <p>HAZ CLIC EN UNA PALABRA Y LUEGO EN SU HABITACIÓN</p>
                <div id="lives-display" class="lives-container"></div>
            </div>
            <div class="stats">
                <div class="score-panel">
                    <span class="label">ACIERTOS</span>
                    <span id="score">0 / 24</span>
                </div>
                <button id="reset-btn">REINICIAR</button>
            </div>
        </header>

        <main>
            <div class="rooms-grid">
                <div class="room" data-category="La Cocina">
                    <h2>🍳 LA COCINA</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room" data-category="El Salón">
                    <h2>📺 EL SALÓN</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room" data-category="El Dormitorio">
                    <h2>🛏️ EL DORMITORIO</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room" data-category="El Cuarto de Baño">
                    <h2>🛁 EL CUARTO DE BAÑO</h2>
                    <div class="placed-container"></div>
                </div>
            </div>
        </main>

        <section class="word-bank-section">
            <div id="word-bank" class="bank"></div>
        </section>

        <div id="status-modal" class="modal hidden">
            <div id="modal-content" class="modal-content"></div>
        </div>
    </div>

    <script>
        const VOCAB = [
            { id: '1', word: 'una cocina eléctrica', category: 'La Cocina' },
            { id: '2', word: 'un frigorífico', category: 'La Cocina' },
            { id: '3', word: 'un horno', category: 'La Cocina' },
            { id: '4', word: 'un lavavajillas', category: 'La Cocina' },
            { id: '5', word: 'una sartén', category: 'La Cocina' },
            { id: '6', word: 'una tetera', category: 'La Cocina' },
            { id: '7', word: 'un sofá', category: 'El Salón' },
            { id: '8', word: 'un televisor', category: 'El Salón' },
            { id: '9', word: 'una alfombra', category: 'El Salón' },
            { id: '10', word: 'un cuadro', category: 'El Salón' },
            { id: '11', word: 'un sillón', category: 'El Salón' },
            { id: '12', word: 'una chimenea', category: 'El Salón' },
            { id: '13', word: 'una cama', category: 'El Dormitorio' },
            { id: '14', word: 'una almohada', category: 'El Dormitorio' },
            { id: '15', word: 'una lámpara', category: 'El Dormitorio' },
            { id: '16', word: 'un armario', category: 'El Dormitorio' },
            { id: '17', word: 'una cómoda', category: 'El Dormitorio' },
            { id: '18', word: 'un perchero', category: 'El Dormitorio' },
            { id: '19', word: 'un inodoro', category: 'El Cuarto de Baño' },
            { id: '20', word: 'un lavabo', category: 'El Cuarto de Baño' },
            { id: '21', word: 'una bañera', category: 'El Cuarto de Baño' },
            { id: '22', word: 'una ducha', category: 'El Cuarto de Baño' },
            { id: '23', word: 'un espejo', category: 'El Cuarto de Baño' },
            { id: '24', word: 'una toalla', category: 'El Cuarto de Baño' }
        ];

        let selectedItem = null;
        let score = 0;
        let lives = 3;

        function init() {
            const bank = document.getElementById('word-bank');
            if (!bank) return;
            
            bank.innerHTML = '';
            const shuffled = [...VOCAB].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'word-node';
                div.textContent = item.word;
                div.dataset.id = item.id;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    if (score === VOCAB.length || lives <= 0) return;
                    
                    if (selectedItem && selectedItem.id === item.id) {
                        div.classList.remove('active');
                        selectedItem = null;
                    } else {
                        document.querySelectorAll('.word-node').forEach(n => n.classList.remove('active'));
                        div.classList.add('active');
                        selectedItem = item;
                    }
                };
                
                bank.appendChild(div);
            });

            updateLives();
            updateScore();
            console.log('Game Initialized with ' + shuffled.length + ' words');
        }

        function updateLives() {
            const container = document.getElementById('lives-display');
            if (container) {
                container.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const heart = document.createElement('span');
                    heart.textContent = i < lives ? '❤️' : '🖤';
                    heart.style.opacity = i < lives ? '1' : '0.3';
                    container.appendChild(heart);
                }
            }
        }

        function updateScore() {
            const scoreEl = document.getElementById('score');
            if (scoreEl) scoreEl.textContent = `${score} / ${VOCAB.length}`;
        }

        document.querySelectorAll('.room').forEach(room => {
            room.onclick = () => {
                if (!selectedItem || lives <= 0) return;
                
                const category = room.getAttribute('data-category');
                
                if (selectedItem.category === category) {
                    score++;
                    updateScore();
                    
                    const placed = document.createElement('div');
                    placed.className = 'placed-word';
                    placed.textContent = selectedItem.word;
                    room.querySelector('.placed-container').appendChild(placed);
                    
                    const el = document.querySelector(`[data-id="${selectedItem.id}"]`);
                    if (el) el.remove();
                    selectedItem = null;
                    
                    if (score === VOCAB.length) showStatus('win');
                } else {
                    lives--;
                    updateLives();
                    const el = document.querySelector(`[data-id="${selectedItem.id}"]`);
                    if (el) {
                        el.classList.add('error');
                        if (lives <= 0) {
                            showStatus('lose');
                        } else {
                            setTimeout(() => {
                                el.classList.remove('error', 'active');
                                selectedItem = null;
                            }, 500);
                        }
                    }
                }
            };
        });

        function showStatus(type) {
            const modal = document.getElementById('status-modal');
            const content = document.getElementById('modal-content');
            if (!modal || !content) return;

            if (type === 'win') {
                content.innerHTML = `
                    <span class="icon">🏆</span>
                    <h2>¡EXCELENTE!</h2>
                    <p>ERES UN MAESTRO DEL HOGAR.</p>
                    <button onclick="location.reload()">JUGAR DE NUEVO</button>
                `;
            } else {
                content.innerHTML = `
                    <span class="icon">💀</span>
                    <h2 style="color: var(--error-red)">GAME OVER</h2>
                    <p>TE HAS QUEDADO SIN VIDAS.</p>
                    <button onclick="location.reload()" style="background: var(--error-red); color: white;">REINTENTAR</button>
                `;
            }
            modal.classList.remove('hidden');
        }

        document.getElementById('reset-btn').onclick = () => location.reload();

        // Start the game immediately
        window.onload = init;
    </script>
</body>
</html>
