<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish Categorizer - Click Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="title-group">
                <h1>SPANISH <span>DOMESTICS</span></h1>
                <p>HAZ CLIC EN UNA PALABRA Y LUEGO EN SU HABITACIÓN</p>
                <div id="lives-display" style="margin-top: 10px;"></div>
            </div>
            <div class="stats">
                <div class="score-panel">
                    <span class="label">ACIERTOS</span>
                    <span id="score">0 / 24</span>
                </div>
                <button id="reset-btn">REINICIAR</button>
            </div>
        </header>

        <main>
            <div class="rooms-grid">
                <div class="room room-cocina" data-category="La Cocina">
                    <h2>🍳 LA COCINA</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room room-salon" data-category="El Salón">
                    <h2>📺 EL SALÓN</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room room-dormitorio" data-category="El Dormitorio">
                    <h2>🛏️ EL DORMITORIO</h2>
                    <div class="placed-container"></div>
                </div>
                <div class="room room-bano" data-category="El Cuarto de Baño">
                    <h2>🛁 EL CUARTO DE BAÑO</h2>
                    <div class="placed-container"></div>
                </div>
            </div>
        </main>

        <section class="word-bank-section">
            <div id="word-bank" class="bank"></div>
        </section>

        <div id="win-modal" class="modal hidden">
            <div class="modal-content">
                <span class="trophy">🏆</span>
                <h2>MISIÓN VIP</h2>
                <p>HAS COMPLETADO EL VOCABULARIO CON ÉXITO.</p>
                <button onclick="location.reload()">JUGAR DE NUEVO</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
